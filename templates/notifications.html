{% extends "layout.html" %}

{% block content %}
<div class="page-wrapper" style="max-width: 680px; padding-top: 2.5rem;">

  <div class="page-header">
    <div class="page-header__eyebrow">Inbox</div>
    <h1>Notifications</h1>
  </div>

  {% if notifs %}
    {% for n in notifs %}
    {% if n.link %}
    <a class="notif-item notif-item--{% if not n.is_read %}unread{% else %}read{% endif %}" href="{{ n.link }}">
      <div class="notif-dot"></div>
      <div class="notif-text">{{ n.message }}</div>
    </a>
    {% else %}
    <div class="notif-item notif-item--{% if not n.is_read %}unread{% else %}read{% endif %}">
      <div class="notif-dot"></div>
      <div class="notif-text">{{ n.message }}</div>
    </div>
    {% endif %}
    {% endfor %}
  {% else %}
    <div class="empty-state">
      You're all caught up.<br>
      No notifications yet.
    </div>
  {% endif %}

</div>
{% endblock %}
