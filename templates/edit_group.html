{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="column column-60 column-offset-20">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2>Edit Group</h2>
            <a class="button button-outline" href="/group/{{ group.id }}">Cancel</a>
        </div>

        <form method="POST">
            <fieldset>
                <label for="name">Group Name</label>
                <input type="text" id="name" name="name" value="{{ group.name }}" required>

                <label for="contact_info">Contact Info (Discord/Email)</label>
                <input type="text" id="contact_info" name="contact_info" value="{{ group.contact_info }}" required>

                <label for="description">Description <small>(optional)</small></label>
                <textarea id="description" name="description" rows="3" style="resize:vertical;">{{ group.description or '' }}</textarea>

                <label for="max_members">Member Limit <small>(optional — leave blank for unlimited)</small></label>
                <input type="number" id="max_members" name="max_members" min="2"
                       value="{{ group.max_members or '' }}" placeholder="e.g. 6">

                <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-top:.5rem;">
                    <input type="checkbox" name="is_public" id="is_public"
                           {% if group.is_public %}checked{% endif %} style="width:auto;margin:0;">
                    Public group (anyone can join instantly; uncheck for private/request-only)
                </label>

                <br>
                <input class="button-primary" type="submit" value="Save Changes">
            </fieldset>
        </form>
    </div>
</div>
{% endblock %}
